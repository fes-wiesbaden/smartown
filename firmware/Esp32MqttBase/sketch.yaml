default_fqbn: esp32:esp32:esp32
default_port: /dev/ttyUSB0
default_profile: dev

profiles:
  dev:
    fqbn: esp32:esp32:esp32
    platforms:
      - platform: esp32:esp32 (3.3.8)
    libraries:
      - PubSubClient (2.8.0)
    port: /dev/ttyUSB0
    protocol: serial
    port_config:
      baudrate: "115200"
