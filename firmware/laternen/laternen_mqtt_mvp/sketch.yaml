default_fqbn: esp32:esp32:esp32
default_profile: dev

profiles:
  dev:
    fqbn: esp32:esp32:esp32
    platforms:
      - platform: esp32:esp32 (3.3.8)
    libraries:
      - Adafruit BusIO (1.17.2)
      - Adafruit PWM Servo Driver Library (3.0.2)
      - ArduinoJson (7.4.2)
      - BH1750 (1.3.0)
      - PubSubClient (2.8.0)
